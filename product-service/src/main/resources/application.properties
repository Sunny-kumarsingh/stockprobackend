spring.application.name=product-service


jwt.secret=mysecretkeymysecretkeymysecretkey12345
server.port=8082

#  MySQL Config
spring.datasource.url=jdbc:mysql://localhost:3306/stockpro_product
spring.datasource.username=root
spring.datasource.password=Ravi@ku123

#  JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.forward-headers-strategy=framework

#  Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Redis Cache
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms


#=====================
#Actuator
#======================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Optional info
info.app.name=Product Service
info.app.version=1.0
info.app.description=Inventory Product Microservice

#===============================
#Swagger / OpenAPI
#===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true


# Logging — SLF4J log file
logging.file.name=logs/stockpro-product.log
logging.level.root=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
