spring.application.name=stockmovement-services
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/stockpro_movements
spring.datasource.username=root
spring.datasource.password=Ravi@ku123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.forward-headers-strategy=framework

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.instance-id=${eureka.instance.hostname}:${spring.application.name}:${server.port}

jwt.secret=mysecretkeymysecretkeymysecretkey12345

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#===============================
#Swagger / OpenAPI
#===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true


# Logging — SLF4J log file
logging.file.name=logs/stockpro-stockmovent.log
logging.level.root=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
