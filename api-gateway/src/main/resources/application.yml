server:
  port: 8080

spring:
  application:
    name: gateway-service
  codec:
    max-in-memory-size: 10MB
  cloud:
    gateway:
      httpclient:
        max-header-size: 65536
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: lb://AUTHSERVICE
          predicates:
            - Path=/api/v1/auth/**

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/v1/products/**

        #  Product images — must go through gateway so CORS is not an issue
        - id: product-uploads
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/uploads/**

        - id: warehouse-service
          uri: lb://WAREHOUSE-SERVICE
          predicates:
            - Path=/api/v1/warehouses/**

        # Supplier Service
        - id: supplier-service
          uri: lb://SUPPLIER-SERVICE
          predicates:
            - Path=/api/v1/suppliers/**

        # Stock Movement Service
        - id: stockmovement-services
          uri: lb://stockmovement-services
          predicates:
            - Path=/api/v1/movements/**,/api/v1/movements

        # Purchase Service
        - id: purchase-service
          uri: lb://purchase-service
          predicates:
            - Path=/api/v1/purchase-orders/**

        # Analytics Service
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/v1/analytics/**

        # Alert Service
        - id: alert-service
          uri: lb://ALERT-SERVICE
          predicates:
            - Path=/api/v1/alerts/**

        # Payment Service
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**


        # Swagger Docs Aggregation Routes
        - id: auth-docs
          uri: lb://AUTHSERVICE
          predicates:
            - Path=/auth/v3/api-docs, /auth/v3/api-docs/**
          filters:
            - 'RewritePath=/auth/(.*), /$1'

        - id: product-docs
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/product/v3/api-docs, /product/v3/api-docs/**
          filters:
            - 'RewritePath=/product/(.*), /$1'

        - id: warehouse-docs
          uri: lb://WAREHOUSE-SERVICE
          predicates:
            - Path=/warehouse/v3/api-docs, /warehouse/v3/api-docs/**
          filters:
            - 'RewritePath=/warehouse/(.*), /$1'

        - id: supplier-docs
          uri: lb://SUPPLIER-SERVICE
          predicates:
            - Path=/supplier/v3/api-docs, /supplier/v3/api-docs/**
          filters:
            - 'RewritePath=/supplier/(.*), /$1'

        - id: movement-docs
          uri: lb://stockmovement-services
          predicates:
            - Path=/movement/v3/api-docs, /movement/v3/api-docs/**
          filters:
            - 'RewritePath=/movement/(.*), /$1'

        - id: purchase-docs
          uri: lb://purchase-service
          predicates:
            - Path=/purchase/v3/api-docs, /purchase/v3/api-docs/**
          filters:
            - 'RewritePath=/purchase/(.*), /$1'

        - id: analytics-docs
          uri: lb://analytics-service
          predicates:
            - Path=/analytics/v3/api-docs, /analytics/v3/api-docs/**
          filters:
            - 'RewritePath=/analytics/(.*), /$1'

        - id: alert-docs
          uri: lb://ALERT-SERVICE
          predicates:
            - Path=/alert/v3/api-docs, /alert/v3/api-docs/**
          filters:
            - 'RewritePath=/alert/(.*), /$1'

        - id: payment-docs
          uri: lb://payment-service
          predicates:
            - Path=/payment/v3/api-docs, /payment/v3/api-docs/**
          filters:
            - 'RewritePath=/payment/(.*), /$1'


springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: Product Service
        url: /product/v3/api-docs
      - name: Warehouse Service
        url: /warehouse/v3/api-docs
      - name: Supplier Service
        url: /supplier/v3/api-docs
      - name: Movement Service
        url: /movement/v3/api-docs
      - name: Purchase Service
        url: /purchase/v3/api-docs
      - name: Analytics Service
        url: /analytics/v3/api-docs
      - name: Alert Service
        url: /alert/v3/api-docs
      - name: Payment Service
        url: /payment/v3/api-docs


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

# Logging — SLF4J log file
logging:
  file:
    name: logs/stockpro-gateway.log
  level:
    root: INFO
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
