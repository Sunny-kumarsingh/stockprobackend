spring.application.name=alert-service

server.port=8088
server.forward-headers-strategy=framework

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/stockpro_alert_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Ravi@ku123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.instance-id=${eureka.instance.hostname}:${spring.application.name}:${server.port}

# JWT (same secret as all other services)
jwt.secret=mysecretkeymysecretkeymysecretkey12345

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.missing-queues-fatal=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=3000
spring.rabbitmq.listener.simple.retry.max-attempts=5

# Mail — USE Gmail App Password, NOT your real password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sunnykumarsingh2711@gmail.com
spring.mail.password=hsqziswkpxrvmupk
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging — SLF4J log file
logging.file.name=logs/stockpro-alert.log
logging.level.root=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
