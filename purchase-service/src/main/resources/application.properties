
# Server
server.port=8084

# Application Name
spring.application.name=purchase-service

# Database Config
spring.datasource.url=jdbc:mysql://localhost:3306/stockpro_purchase_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Ravi@ku123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Config
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true

# Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Redis Cache
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Feign Config
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# JWT Config
jwt.secret=mysecretkeymysecretkeymysecretkey12345

# Actuator Config
management.endpoints.web.exposure.include=*

# Swagger Config
springdoc.api-docs.path=/v3/api-docs

# RabbitMQ Config
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Logging — SLF4J log file
logging.file.name=logs/stockpro-purchase.log
logging.level.root=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
