spring.application.name=authservice


jwt.secret=mysecretkeymysecretkeymysecretkey12345
jwt.expiration=28800000

# ===============================
# GOOGLE OAUTH2
# ===============================
google.client.id=491908488436-5n02sg3vkftrt5ikj6ce88b0ueosrhhl.apps.googleusercontent.com


# ===============================
# DATABASE CONFIG
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/auth_db
spring.datasource.username=root
spring.datasource.password=Ravi@ku123

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SERVER
# ===============================
server.port=8081

# ===============================
# EUREKA
# ===============================
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# ===============================
# REDIS
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

#===============================
#Actuator
#===============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
info.app.name=Auth Service
info.app.version=1.0
info.app.description=Authentication Microservice
#===============================
#Swagger / OpenAPI
#===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

#===============================
# Gateway Integration
#===============================
server.forward-headers-strategy=framework


# Logging — SLF4J log file
logging.file.name=logs/stockpro-auth.log
logging.level.root=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
