      - "8089:8089"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT:-3306}/stockpro_payment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka/
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - EUREKA_INSTANCE_HOSTNAME=payment-service
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=false
    depends_on:
      eureka-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stockpro-network

  api-gateway:
    image: ${DOCKERHUB_NAMESPACE:-sunnykumarsingh}/stockpro-backend-api-gateway:${IMAGE_TAG:-latest}
    container_name: stockpro-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      eureka-service:
        condition: service_healthy
    networks:
      - stockpro-network

networks:
  stockpro-network:
    driver: bridge

volumes:
  product-uploads:
    driver: local
  rabbitmq_data:
    driver: local
