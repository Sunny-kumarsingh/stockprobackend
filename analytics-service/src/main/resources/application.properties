# Application Name
spring.application.name=analytics-service

# Server Port (next available after 8086)
server.port=8087

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/stockpro_analytics_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Ravi@ku123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Config
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.instance-id=${eureka.instance.hostname}:${spring.application.name}:${server.port}

# Redis Cache
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Feign Client Timeouts
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# JWT (same secret as all other services)
jwt.secret=mysecretkeymysecretkeymysecretkey12345
jwt.expiration=28800000

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging
logging.level.org.springframework=INFO
logging.level.com.stockpro=DEBUG

# App Info
info.app.name=Analytics Service
info.app.version=1.0
info.app.description=Inventory Analytics and Business Intelligence Microservice


# RabbitMQ Config
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Don't crash if queues don't exist yet â keep retrying until publisher creates them
spring.rabbitmq.listener.simple.missing-queues-fatal=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=3000
spring.rabbitmq.listener.simple.retry.max-attempts=5


# Analytics Queue Names
analytics.queue.stock-movement=stock.movement.queue
analytics.exchange=stockpro.exchange



# Logging — SLF4J log file
logging.file.name=logs/stockpro-analytics.log
logging.level.root=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
