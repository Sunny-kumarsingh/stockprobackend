server.port=8089
spring.application.name=payment-service

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/stockpro_payment
spring.datasource.username=root
spring.datasource.password=Ravi@ku123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.forward-headers-strategy=framework

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest


# JWT Secret (must match ALL other services)
jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey12345}


# SLF4J Logging
logging.file.name=logs/stockpro-payment.log
logging.level.root=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

#=====================
#Actuator
#======================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Optional info
info.app.name=Payment Service
info.app.version=1.0
info.app.description=Inventory Payment Microservice

# Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html



